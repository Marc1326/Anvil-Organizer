name: Build .deb Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-setuptools python3-wheel

      - name: Prepare source tree
        run: |
          cp -r packaging/deb/debian .
          chmod +x debian/rules

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect .deb
        run: |
          mkdir -p dist
          cp ../anvil-organizer_*.deb dist/

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-organizer-deb
          path: dist/*.deb

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/*.deb
