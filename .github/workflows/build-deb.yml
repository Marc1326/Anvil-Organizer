name: Build .deb Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv ruby-dev build-essential
          sudo gem install fpm

      - name: Create package structure
        run: |
          python3 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install .

          mkdir -p pkg/opt/anvil-organizer
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p pkg/usr/share/icons/hicolor/scalable/apps

          cp -r /tmp/build-venv/lib/python*/site-packages/* pkg/opt/anvil-organizer/

          printf '#!/usr/bin/env bash\nexport PYTHONPATH="/opt/anvil-organizer${PYTHONPATH:+:$PYTHONPATH}"\nexec python3 -m anvil "$@"\n' > pkg/usr/bin/anvil-organizer
          chmod +x pkg/usr/bin/anvil-organizer

          install -Dm644 anvil-organizer.desktop \
            pkg/usr/share/applications/anvil-organizer.desktop
          install -Dm644 anvil/resources/logo.png \
            pkg/usr/share/icons/hicolor/256x256/apps/anvil-organizer.png
          install -Dm644 anvil/resources/logo.svg \
            pkg/usr/share/icons/hicolor/scalable/apps/anvil-organizer.svg

      - name: Build .deb
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fpm -s dir -t deb \
            --name anvil-organizer \
            --version "$VERSION" \
            --architecture amd64 \
            --description "Native Linux Mod Manager inspired by Mod Organizer 2" \
            --url "https://anvil-organizer.net" \
            --maintainer "Marc <marc1326@users.noreply.github.com>" \
            --license "GPL-3.0-or-later" \
            --category games \
            --depends "python3 >= 3.11" \
            --deb-no-default-config-files \
            -C pkg \
            .
          mkdir -p dist
          mv anvil-organizer_*.deb dist/

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-organizer-deb
          path: dist/*.deb

      - name: Get version tag
        id: version
        run: echo "tag=v$(python3 -c 'from anvil.version import APP_VERSION; print(APP_VERSION)')" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.deb
