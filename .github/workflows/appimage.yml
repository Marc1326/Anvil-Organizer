name: Build AppImage

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 (deadsnakes)
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.12 python3.12-venv python3.12-dev

      - name: Install dependencies
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt "PySide6>=6.6.0,<6.10.0"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          source .venv/bin/activate
          pyinstaller anvil-organizer.spec --noconfirm

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          # AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/anvil-organizer" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          # Desktop + Icon
          cp anvil-organizer.desktop AppDir/
          cp anvil/resources/logo.png AppDir/anvil-organizer.png
          # Binary
          cp -a dist/anvil-organizer/* AppDir/usr/bin/

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          source .venv/bin/activate
          VERSION=$(python -c "from anvil.version import APP_VERSION; print(APP_VERSION)")
          ARCH=x86_64 ./appimagetool AppDir "Anvil_Organizer-${VERSION}-x86_64.AppImage"

      - name: Build .deb package
        run: |
          source .venv/bin/activate
          VERSION=$(python -c "from anvil.version import APP_VERSION; print(APP_VERSION)")
          PKG="anvil-organizer_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/anvil-organizer"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          # Control file
          cat > "${PKG}/DEBIAN/control" << CTRL
          Package: anvil-organizer
          Version: ${VERSION}
          Section: games
          Priority: optional
          Architecture: amd64
          Depends: libxcb1, libxkbcommon0, libgl1
          Maintainer: Marc <marc@anvil-organizer.dev>
          Description: Anvil Organizer — Native Linux Mod Manager
           Mod manager for Linux supporting Steam, Proton, and Nexus Mods.
           Supports Baldur's Gate 3, Cyberpunk 2077, Skyrim, Fallout 4,
           The Witcher 3, Starfield, and Red Dead Redemption 2.
          CTRL
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          # Copy PyInstaller dist
          cp -a dist/anvil-organizer/* "${PKG}/opt/anvil-organizer/"

          # Symlink in PATH
          ln -s /opt/anvil-organizer/anvil-organizer "${PKG}/usr/bin/anvil-organizer"

          # Desktop entry
          cat > "${PKG}/usr/share/applications/anvil-organizer.desktop" << DESK
          [Desktop Entry]
          Type=Application
          Name=Anvil Organizer
          GenericName=Mod Manager
          Comment=Native Linux Mod Manager
          Exec=anvil-organizer %u
          Icon=anvil-organizer
          Terminal=false
          Categories=Game;Utility;
          Keywords=mod;modding;gaming;steam;proton;nexus;
          StartupWMClass=anvil-organizer
          MimeType=x-scheme-handler/nxm;
          DESK
          sed -i 's/^          //' "${PKG}/usr/share/applications/anvil-organizer.desktop"

          # Icon
          cp anvil/resources/logo.png "${PKG}/usr/share/icons/hicolor/256x256/apps/anvil-organizer.png"

          # Build .deb
          dpkg-deb --build --root-owner-group "${PKG}"
          echo "deb_file=${PKG}.deb" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-organizer-appimage
          path: Anvil_Organizer-*-x86_64.AppImage

      - name: Get version tag
        id: version
        run: |
          source .venv/bin/activate
          echo "tag=v$(python -c 'from anvil.version import APP_VERSION; print(APP_VERSION)')" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            Anvil_Organizer-*-x86_64.AppImage
            anvil-organizer_*_amd64.deb
            Anvil-Organizer-installer.sh
