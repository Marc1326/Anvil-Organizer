name: Build Flatpak

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/com.github.Marc1326.AnvilOrganizer.yml
          bundle: anvil-organizer.flatpak
          upload-artifact: true
