name: Build & Publish Snap

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Copy snapcraft.yaml to root
        run: cp packaging/snap/snapcraft.yaml .

      - uses: snapcore/action-build@v1
        id: build

      - name: Upload snap as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-organizer-snap
          path: ${{ steps.build.outputs.snap }}

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ steps.build.outputs.snap }}

      - name: Publish to Snap Store
        if: secrets.SNAP_STORE_TOKEN != ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        run: |
          snapcraft upload --release=edge ${{ steps.build.outputs.snap }}
