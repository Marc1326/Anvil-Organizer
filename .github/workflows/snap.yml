name: Build & Publish Snap

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Copy snapcraft.yaml to root
        run: cp packaging/snap/snapcraft.yaml .

      - uses: snapcore/action-build@v1
        id: build

      - name: Upload snap as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anvil-organizer-snap
          path: ${{ steps.build.outputs.snap }}

      - name: Get version tag
        id: version
        run: echo "tag=v$(python3 -c 'from anvil.version import APP_VERSION; print(APP_VERSION)')" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.build.outputs.snap }}

      - name: Publish to Snap Store
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        run: |
          if [ -n "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            snapcraft upload --release=edge ${{ steps.build.outputs.snap }}
          else
            echo "SNAP_STORE_TOKEN not set, skipping publish"
          fi
