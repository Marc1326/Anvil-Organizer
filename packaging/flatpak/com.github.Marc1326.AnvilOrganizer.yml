app-id: com.github.Marc1326.AnvilOrganizer
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: anvil-organizer

finish-args:
  # GUI
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # File access (home for mod instances, game dirs)
  - --filesystem=home
  # Removable media (USB drives with mods)
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media
  # Network (Nexus API, NXM downloads)
  - --share=network
  # Desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # NXM URL handler
  - --talk-name=org.freedesktop.portal.Desktop
  # Keyring / Secret Service (store Nexus API key)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  # Host access (launch Steam, LOOT, Proton from sandbox)
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: krb5
    subdir: src
    config-opts:
      - --disable-static
      - --disable-rpc
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.21/krb5-1.21.3.tar.gz
        sha256: b7a4cd5ead67fb08b980b21abd150ff7217e85ea320c9ed0c6dadd304840ad35
    cleanup:
      - /bin
      - /sbin
      - /share/man
      - /share/et

  - name: python-lz4
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/l/lz4/lz4-4.3.3.tar.gz
        sha256: 01fe674ef2889dbb9899d8a67361e0c4a2c833af5aeb37dd505727cf5d2a131e

  # ── Credential storage: keyring + encrypted-file fallback ──
  - name: python-pycparser
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app pycparser-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/0c/c3/44f3fbbfa403ea2a7c779186dc20772604442dde72947e7d01069cbe98e3/pycparser-3.0-py3-none-any.whl
        sha256: b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992

  - name: python-cffi
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app cffi-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/78/2d/7fa73dfa841b5ac06c7b8855cfc18622132e365f5b81d02230333ff26e9e/cffi-2.0.0-cp312-cp312-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
        sha256: 3e17ed538242334bf70832644a32a7aae3d83b57567f9fd60a26257e992b79ba

  - name: python-cryptography
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app cryptography-*.whl
    sources:
