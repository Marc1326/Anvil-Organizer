app-id: com.github.Marc1326.AnvilOrganizer
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: anvil-organizer

finish-args:
  # GUI
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # File access (home for mod instances, game dirs)
  - --filesystem=home
  # Removable media (USB drives with mods)
  - --filesystem=/media:ro
  - --filesystem=/mnt:ro
  - --filesystem=/run/media:ro
  # Network (Nexus API, NXM downloads)
  - --share=network
  # Desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # NXM URL handler
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: python-lz4
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app lz4>=4.0.0
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/l/lz4/lz4-4.3.3.tar.gz
        sha256: 01fe674ef2889e42571a28a07c0e4f1a001b4c085c7f59ad4f84497cc3e8314d

  - name: python-pyside6
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app PySide6>=6.6.0
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/P/PySide6/PySide6-6.8.3-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: SKIP

  - name: anvil-organizer
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
      - install -Dm644 anvil-organizer.desktop
          /app/share/applications/com.github.Marc1326.AnvilOrganizer.desktop
      - install -Dm644 anvil/resources/logo.png
          /app/share/icons/hicolor/256x256/apps/com.github.Marc1326.AnvilOrganizer.png
      - install -Dm644 anvil/resources/logo.svg
          /app/share/icons/hicolor/scalable/apps/com.github.Marc1326.AnvilOrganizer.svg
    sources:
      - type: git
        url: https://github.com/Marc1326/Anvil-Organizer.git
        tag: v1.2.0
